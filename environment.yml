name: bioinfo_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core Python
  - python=3.11
  - pip
  
  # Bioinformatics CLI tools
  - mafft
  - blast
  - iqtree
  - vina
  - augur
  - nglview
  
  # Python packages via conda
  - rdkit
  - biopython
  - mdanalysis
  - numpy
  - pandas
  - matplotlib
  - scipy
  
  # Python packages via pip
  - pip:
    - biopython>=1.86
    - mdanalysis>=2.10.0
    - nextstrain-augur>=33.0.1
    # Additional packages for analysis scripts
    - scikit-learn
    - seaborn
    - jupyter
    - ipython

# Platform compatibility (optional)
platforms:
  - linux-64
  - osx-64